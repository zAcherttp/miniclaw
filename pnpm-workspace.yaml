packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  tailwindcss: ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  shadcn: ^4.7.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  lucide-react: ^1.16.0
  tw-animate-css: ^1.4.0
  "@fontsource-variable/geist": ^5.2.8
  "@base-ui/react": ^1.4.1
  "@vitejs/plugin-react": ^5.1.1
  react: ^19.2.6
  react-dom: ^19.2.6
  "@types/react": ^19.2.7
  "@types/react-dom": ^19.2.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  msw: true
